name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project
        run: |
          flutter create . --project-name audiobook_app --org com.playtorrio.audiobook
          bash tool/patch_android.sh

      - name: Install Android SDK platform 36
        run: |
          set -euo pipefail
          yes | flutter doctor --android-licenses >/dev/null 2>&1 || true

          SDK_DIR=""
          if [[ -f android/local.properties ]]; then
            SDK_DIR="$(grep '^sdk.dir=' android/local.properties | cut -d= -f2- | tr -d '\r')"
          fi

          SDKMANAGER=""
          for candidate in \
            "${SDK_DIR}/cmdline-tools/latest/bin/sdkmanager" \
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/latest/bin/sdkmanager" \
            "${ANDROID_HOME:-}/cmdline-tools/latest/bin/sdkmanager" \
            "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"; do
            if [[ -n "$candidate" && -x "$candidate" ]]; then
              SDKMANAGER="$candidate"
              break
            fi
          done

          if [[ -z "$SDKMANAGER" ]]; then
            echo "sdkmanager not found; Gradle will download platform 36 if needed"
            exit 0
          fi

          "$SDKMANAGER" "platforms;android-36"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Configure release signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        env:
          PLAYTORRIO_SUPABASE_URL: ${{ secrets.PLAYTORRIO_SUPABASE_URL }}
          PLAYTORRIO_SUPABASE_ANON_KEY: ${{ secrets.PLAYTORRIO_SUPABASE_ANON_KEY }}
        run: |
          build_args=()
          if [[ -n "${PLAYTORRIO_SUPABASE_URL}" && -n "${PLAYTORRIO_SUPABASE_ANON_KEY}" ]]; then
            build_args+=(
              "--dart-define=PLAYTORRIO_SUPABASE_URL=${PLAYTORRIO_SUPABASE_URL}"
              "--dart-define=PLAYTORRIO_SUPABASE_ANON_KEY=${PLAYTORRIO_SUPABASE_ANON_KEY}"
            )
          fi
          flutter build apk --release "${build_args[@]}"

      - name: Prepare release APK
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr '+' '-')"
          APK_NAME="stories-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"
          echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "APK_NAME=${APK_NAME}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stories-release-apk
          path: ${{ env.APK_NAME }}
          if-no-files-found: error

      - name: Remove legacy published per-build releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if [[ "$tag" =~ -build\.[0-9]+$ ]]; then
              gh release delete "$tag" --yes --cleanup-tag || true
            fi
          done < <(gh release list --json tagName --jq '.[].tagName')

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES="$(cat <<EOF
          Pre-release APK for Stories **${RELEASE_TAG}**.

          Built from commit ${GITHUB_SHA} on run ${GITHUB_RUN_ID}.
          Rebuilds with the same \`pubspec.yaml\` version replace this APK.
          Bump the app version in \`pubspec.yaml\` to start a new release line.
          EOF
          )"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${APK_NAME}" --clobber
            gh release edit "${RELEASE_TAG}" \
              --prerelease \
              --title "Stories ${RELEASE_TAG}" \
              --notes "$NOTES"
          else
            gh release create "${RELEASE_TAG}" "${APK_NAME}" \
              --prerelease \
              --title "Stories ${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --notes "$NOTES"
          fi

          URL="$(gh release view "${RELEASE_TAG}" --json url --jq .url)"
          echo "RELEASE_URL=${URL}" >> "$GITHUB_ENV"
          {
            echo "## Release APK"
            echo ""
            echo "Download from [Stories ${RELEASE_TAG}](${URL})."
          } >> "$GITHUB_STEP_SUMMARY"
