name: audiobook_app
description: Stories — audiobook player (Audiobook Bay, search, player, downloads).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  html: ^0.15.4
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.2.4
  google_fonts: ^8.0.2
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  libtorrent_flutter: 1.8.2
  file_picker: ^8.0.0+1
  archive: ^4.0.4
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: '#000000'
  adaptive_icon_foreground: assets/icon/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
